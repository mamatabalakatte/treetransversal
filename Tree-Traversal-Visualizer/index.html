<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tree Traversal Visualizer</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <h1>🌳 Tree Traversal Visualizer</h1>
</header>

<div class="container">

    <div class="controls">

        <input
            type="number"
            id="valueInput"
            placeholder="Enter value">

        <button id="insertBtn">Insert</button>
        <button id="deleteBtn">Delete</button>
        <button id="searchBtn">Search</button>

        <hr>

        <button id="preorderBtn">Preorder</button>
        <button id="inorderBtn">Inorder</button>
        <button id="postorderBtn">Postorder</button>

        <div id="output"></div>

    </div>

    <div class="canvas">

        <svg id="treeCanvas" width="900" height="550"></svg>

    </div>

</div>

<script type="module" src="js/script.js"></script>

</body>
</html>
